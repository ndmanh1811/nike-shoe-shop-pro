<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User form</title>

    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>

<div th:replace="~{fragments/admin :: layout(~{::content})}">
    <div th:fragment="content">

        <div class="admin-card mx-auto" style="max-width: 840px;">
            <h5 class="fw-bold mb-4">User form</h5>

            <form th:action="@{/admin/users/save}" method="post" th:object="${form}" class="row g-3">

                <input type="hidden" th:field="*{id}">

                <!-- ❌ XOÁ CSRF -->

                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input class="form-control" th:field="*{email}" disabled>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Full name</label>
                    <input class="form-control" th:field="*{fullName}">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Phone</label>
                    <input class="form-control" th:field="*{phone}">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Address</label>
                    <input class="form-control" th:field="*{address}">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Role</label>
                    <select class="form-select" th:field="*{role}">
                        <option value="ROLE_USER">USER</option>
                        <option value="ROLE_ADMIN">ADMIN</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Enabled</label>
                    <select class="form-select" th:field="*{enabled}">
                        <option value="true">Active</option>
                        <option value="false">Locked</option>
                    </select>
                </div>

                <div class="col-12 d-flex gap-2">
                    <button class="btn btn-light rounded-pill px-4">Save</button>
                    <a class="btn btn-outline-light rounded-pill px-4"
                       th:href="@{/admin/users}">
                        Back
                    </a>
                </div>

            </form>

        </div>

    </div>
</div>

</body>
</html>
