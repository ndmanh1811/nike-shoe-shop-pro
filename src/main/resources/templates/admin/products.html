<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div th:replace="~{fragments/admin :: layout(~{::content})}">
    <div th:fragment="content">
        <div class="admin-card">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0 fw-bold">Products</h5>
                <a class="btn btn-light rounded-pill" th:href="@{/admin/products/create}">Add product</a>
            </div>
            <div class="table-responsive">
                <table class="table table-dark table-borderless align-middle">
                    <thead><tr><th>Name</th><th>Brand</th><th>Category</th><th>Price</th><th>Active</th><th>Actions</th></tr></thead>
                    <tbody>
                    <tr th:each="p : ${products}">
                        <td th:text="${p.name}"></td>
                        <td th:text="${p.brand.name}"></td>
                        <td th:text="${p.category.name}"></td>
                        <td th:text="${#numbers.formatDecimal(p.effectivePrice(),0,'COMMA',0,'POINT')} + ' đ'"></td>
                        <td th:text="${p.active ? 'Yes' : 'No'}"></td>
                        <td class="d-flex gap-2">
                            <a class="btn btn-sm btn-outline-light" th:href="@{'/admin/products/' + ${p.id} + '/edit'}">Edit</a>
                            <form th:action="@{'/admin/products/' + ${p.id} + '/delete'}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="btn btn-sm btn-danger">Delete</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
