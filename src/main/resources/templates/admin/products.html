<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Products</title>

    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>

<div th:replace="~{fragments/admin :: layout(~{::content})}">
    <div th:fragment="content">

        <div class="admin-card">

            <!-- 🔥 TOAST -->
            <div th:if="${success}" class="alert alert-success text-center">
                <span th:text="${success}"></span>
            </div>

            <!-- 🔍 SEARCH -->
            <form method="get" class="mb-3">
                <input type="text" name="keyword" th:value="${keyword}"
                       placeholder="Search product..." class="form-control">
            </form>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0 fw-bold">Products</h5>
                <a class="btn btn-light rounded-pill" th:href="@{/admin/products/create}">
                    Add product
                </a>
            </div>

            <div class="table-responsive">
                <table class="table table-dark table-borderless align-middle">

                    <thead>
                    <tr>
                        <th>Name</th>
                        <th>Brand</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Active</th>
                        <th>Actions</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="p : ${products}">
                        <td th:text="${p.name}"></td>
                        <td th:text="${p.brand != null ? p.brand.name : 'N/A'}"></td>
                        <td th:text="${p.category != null ? p.category.name : 'N/A'}"></td>
                        <td th:text="${p.price} + ' đ'"></td>
                        <td th:text="${p.active ? 'Yes' : 'No'}"></td>

                        <td class="d-flex gap-2">
                            <a class="btn btn-sm btn-outline-light"
                               th:href="@{'/admin/products/' + ${p.id} + '/edit'}">
                                Edit
                            </a>

                            <form th:action="@{'/admin/products/' + ${p.id} + '/delete'}"
                                  method="post">
                                <button class="btn btn-sm btn-danger">Delete</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>

                </table>
            </div>

        </div>

    </div>
</div>

</body>
</html>
