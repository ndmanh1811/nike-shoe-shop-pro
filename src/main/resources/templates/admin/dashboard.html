<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin dashboard</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div th:replace="~{fragments/admin :: layout(~{::content})}">
    <div th:fragment="content">
        <div class="row g-4">
            <div class="col-md-6 col-xl-3">
                <div class="metric-card">
                    <div class="metric-label">Products</div>
                    <div class="metric-value" th:text="${productCount}"></div>
                </div>
            </div>
            <div class="col-md-6 col-xl-3">
                <div class="metric-card">
                    <div class="metric-label">Categories</div>
                    <div class="metric-value" th:text="${categoryCount}"></div>
                </div>
            </div>
            <div class="col-md-6 col-xl-3">
                <div class="metric-card">
                    <div class="metric-label">Brands</div>
                    <div class="metric-value" th:text="${brandCount}"></div>
                </div>
            </div>
            <div class="col-md-6 col-xl-3">
                <div class="metric-card">
                    <div class="metric-label">Orders</div>
                    <div class="metric-value" th:text="${orderCount}"></div>
                </div>
            </div>
            <div class="col-md-6 col-xl-3">
                <div class="metric-card">
                    <div class="metric-label">Users</div>
                    <div class="metric-value" th:text="${userCount}"></div>
                </div>
            </div>
            <div class="col-md-6 col-xl-3">
                <div class="metric-card">
                    <div class="metric-label">Revenue</div>
                    <div class="metric-value" th:text="${#numbers.formatDecimal(revenue,0,'COMMA',0,'POINT')} + ' đ'"></div>
                </div>
            </div>
            <div class="col-md-6 col-xl-3">
                <div class="metric-card">
                    <div class="metric-label">Pending</div>
                    <div class="metric-value" th:text="${pendingOrders}"></div>
                </div>
            </div>
        </div>

        <div class="row g-4 mt-1">
            <div class="col-xl-8">
                <div class="admin-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0 fw-bold">Latest orders</h5>
                        <a th:href="@{/admin/orders}" class="text-decoration-none">View all</a>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-dark table-borderless align-middle">
                            <thead>
                            <tr>
                                <th>Code</th><th>Customer</th><th>Status</th><th>Total</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="o : ${latestOrders}">
                                <td><a class="text-white text-decoration-none" th:href="@{/admin/orders/{id}(id=${o.id})}" th:text="${o.orderCode}"></a></td>
                                <td th:text="${o.customerName}"></td>
                                <td><span class="badge text-bg-warning" th:text="${o.status}"></span></td>
                                <td th:text="${#numbers.formatDecimal(o.totalAmount,0,'COMMA',0,'POINT')} + ' đ'"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-xl-4">
                <div class="admin-card admin-card-hero">
                    <div class="eyebrow text-white-50">Nike-inspired</div>
                    <h3 class="fw-black">Premium control panel</h3>
                    <p class="text-white-50 mb-4">Manage products, categories, users, and orders with a luxury feel.</p>
                    <div class="d-flex gap-2 flex-wrap">
                        <a th:href="@{/admin/products}" class="btn btn-light rounded-pill px-4">Manage products</a>
                        <a th:href="@{/admin/orders}" class="btn btn-outline-light rounded-pill px-4">View orders</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
