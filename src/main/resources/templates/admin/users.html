<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div th:replace="~{fragments/admin :: layout(~{::content})}">
    <div th:fragment="content">
        <div class="admin-card">
            <h5 class="fw-bold mb-3">Users</h5>
            <div class="table-responsive">
                <table class="table table-dark table-borderless align-middle">
                    <thead><tr><th>Email</th><th>Name</th><th>Role</th><th>Enabled</th><th>Actions</th></tr></thead>
                    <tbody>
                    <tr th:each="u : ${users}">
                        <td th:text="${u.email}"></td>
                        <td th:text="${u.fullName}"></td>
                        <td th:text="${u.role}"></td>
                        <td th:text="${u.enabled ? 'Yes' : 'No'}"></td>
                        <td>
                            <a class="btn btn-sm btn-outline-light" th:href="@{'/admin/users/' + ${u.id} + '/edit'}">Edit</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
