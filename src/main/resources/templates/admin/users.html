<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users</title>

    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>

<div th:replace="~{fragments/admin :: layout(~{::content})}">
    <div th:fragment="content">

        <div class="admin-card">

            <h5 class="fw-bold mb-3">Users</h5>

            <table class="table table-dark">
                <tr th:each="u : ${users}">
                    <td th:text="${u.email}"></td>
                    <td th:text="${u.fullName}"></td>
                    <td th:text="${u.role}"></td>

                    <td>
                        <span th:text="${u.enabled ? 'Active' : 'Locked'}"></span>
                    </td>

                    <td class="d-flex gap-2">

                        <a class="btn btn-sm btn-outline-light"
                           th:href="@{'/admin/users/' + ${u.id} + '/edit'}">
                            Edit
                        </a>

                        <!-- 🔥 KHÓA/MỞ -->
                        <form th:action="@{'/admin/users/' + ${u.id} + '/toggle'}"
                              method="post">
                            <button class="btn btn-sm"
                                    th:classappend="${u.enabled} ? 'btn-warning' : 'btn-success'">
                                <span th:text="${u.enabled ? 'Lock' : 'Unlock'}"></span>
                            </button>
                        </form>

                    </td>
                </tr>

            </table>

        </div>

    </div>
</div>

</body>
</html>
