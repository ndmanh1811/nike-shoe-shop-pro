<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Brands</title>

    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>

<div th:replace="~{fragments/admin :: layout(~{::content})}">
    <div th:fragment="content">

        <div class="admin-card">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0 fw-bold">Brands</h5>
                <a class="btn btn-light rounded-pill" th:href="@{/admin/brands/create}">
                    Add brand
                </a>
            </div>

            <div class="table-responsive">
                <table class="table table-dark table-borderless align-middle">

                    <thead>
                    <tr>
                        <th>Name</th>
                        <th>Logo</th>
                        <th>Featured</th>
                        <th>Active</th>
                        <th>Actions</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="b : ${brands}">
                        <td th:text="${b.name}"></td>

                        <!-- đẹp hơn -->
                        <td>
                            <img th:if="${b.logoUrl != null}" th:src="${b.logoUrl}"
                                 style="height:40px;">
                            <span th:if="${b.logoUrl == null}" class="text-white-50">No logo</span>
                        </td>

                        <td th:text="${b.featured ? 'Yes' : 'No'}"></td>
                        <td th:text="${b.active ? 'Yes' : 'No'}"></td>

                        <td class="d-flex gap-2">
                            <a class="btn btn-sm btn-outline-light"
                               th:href="@{'/admin/brands/' + ${b.id} + '/edit'}">
                                Edit
                            </a>

                            <!-- ✅ XOÁ CSRF -->
                            <form th:action="@{'/admin/brands/' + ${b.id} + '/delete'}" method="post">
                                <button class="btn btn-sm btn-danger">Delete</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>

                </table>
            </div>

        </div>

    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
