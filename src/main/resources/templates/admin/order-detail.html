<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order detail</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div th:replace="~{fragments/admin :: layout(~{::content})}">
    <div th:fragment="content">
        <div class="row g-4">
            <!-- Left Column: Order Info + Timeline -->
            <div class="col-xl-8">
                <!-- Order Header -->
                <div class="admin-card mb-4">
                    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
                        <div>
                            <div class="eyebrow">Order Details</div>
                            <h3 class="fw-black mb-1" th:text="${order.orderCode}"></h3>
                            <div class="text-white-50">
                                <i class="bi bi-calendar me-1"></i>
                                <span th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                                <span class="mx-2">•</span>
                                <i class="bi bi-credit-card me-1"></i>
                                <span class="badge" th:classappend="${order.paymentMethod.name() == 'COD' ? 'bg-success' : 'bg-info'}" th:text="${order.paymentMethod}"></span>
                            </div>
                        </div>
                        <div class="text-end">
                            <span class="badge text-bg-warning fs-6 px-3 py-2" th:text="${order.status}"></span>
                            <div class="mt-2 text-white-50 small" th:text="'ID: ' + ${order.id}"></div>
                        </div>
                    </div>
                </div>

                <!-- Order Timeline -->
                <div class="admin-card mb-4">
                    <h5 class="fw-bold mb-4"><i class="bi bi-clock-history me-2"></i>Order Timeline</h5>
                    <div class="timeline">
                        <div th:each="history, iterStat : ${statusHistory}"
                             class="timeline-item"
                             th:classappend="${iterStat.last ? 'active' : ''}">
                            <div class="timeline-marker" th:style="'background-color:' + ${history.statusColor}">
                                <i class="bi" th:class="${history.statusIcon}"></i>
                            </div>
                            <div class="timeline-content">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div>
                                        <h6 class="fw-bold mb-1" th:text="${history.status}"
                                            th:style="'color:' + ${history.statusColor}"></h6>
                                        <p class="text-white-50 mb-0 small" th:text="${history.note}"></p>
                                    </div>
                                    <small class="text-white-50" th:text="${#temporals.format(history.createdAt, 'dd/MM/yyyy HH:mm')}"></small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Order Items -->
                <div class="admin-card">
                    <h5 class="fw-bold mb-4"><i class="bi bi-box-seam me-2"></i>Order Items</h5>
                    <div class="table-responsive">
                        <table class="table table-dark table-borderless align-middle">
                            <thead>
                            <tr><th>Product</th><th>Size</th><th>Qty</th><th class="text-end">Price</th><th class="text-end">Subtotal</th></tr>
                            </thead>
                            <tbody>
                            <tr th:each="item : ${order.items}">
                                <td>
                                    <div class="d-flex align-items-center gap-3">
                                        <img th:if="${item.productImage}" th:src="${item.productImage}" class="rounded-3" style="width:50px;height:50px;object-fit:cover;">
                                        <span th:text="${item.productName}"></span>
                                    </div>
                                </td>
                                <td th:text="${item.size}"></td>
                                <td th:text="${item.quantity}"></td>
                                <td class="text-end" th:text="${#numbers.formatDecimal(item.unitPrice,0,'COMMA',0,'POINT')} + ' đ'"></td>
                                <td class="text-end fw-bold" th:text="${#numbers.formatDecimal(item.subtotal,0,'COMMA',0,'POINT')} + ' đ'"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Right Column: Customer + Payment + Actions -->
            <div class="col-xl-4">
                <!-- Customer Info -->
                <div class="admin-card mb-4">
                    <h5 class="fw-bold mb-3"><i class="bi bi-person me-2"></i>Customer Info</h5>
                    <div class="d-grid gap-2">
                        <div class="d-flex justify-content-between">
                            <span class="text-white-50">Name</span>
                            <span th:text="${order.customerName}"></span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span class="text-white-50">Email</span>
                            <span th:text="${order.email}"></span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span class="text-white-50">Phone</span>
                            <span th:text="${order.phone}"></span>
                        </div>
                        <div class="pt-2 border-top border-secondary">
                            <span class="text-white-50 d-block mb-1">Shipping Address</span>
                            <span th:text="${order.address}"></span>
                        </div>
                    </div>
                </div>

                <!-- Payment Summary -->
                <div class="admin-card mb-4">
                    <h5 class="fw-bold mb-3"><i class="bi bi-receipt me-2"></i>Payment Summary</h5>
                    <div class="d-grid gap-2">
                        <div class="d-flex justify-content-between">
                            <span class="text-white-50">Subtotal</span>
                            <span th:text="${#numbers.formatDecimal(order.subtotalAmount,0,'COMMA',0,'POINT')} + ' đ'"></span>
                        </div>
                        <div class="d-flex justify-content-between text-success" th:if="${order.discountAmount > 0}">
                            <span class="text-white-50">Discount</span>
                            <span>-<span th:text="${#numbers.formatDecimal(order.discountAmount,0,'COMMA',0,'POINT')} + ' đ'"></span></span>
                        </div>
                        <div class="d-flex justify-content-between" th:if="${order.couponCode != null}">
                            <span class="text-white-50">Coupon</span>
                            <span class="badge bg-info" th:text="${order.couponCode}"></span>
                        </div>
                        <hr class="border-secondary">
                        <div class="d-flex justify-content-between">
                            <span class="fw-semibold">Total</span>
                            <strong class="fs-5" th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')} + ' đ'"></strong>
                        </div>
                    </div>
                </div>

                <!-- Update Status Form -->
                <div class="admin-card">
                    <h5 class="fw-bold mb-3"><i class="bi bi-arrow-repeat me-2"></i>Update Status</h5>
                    <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post" class="d-grid gap-3">
                        <div>
                            <label class="form-label text-white-50 small">New Status</label>
                            <select name="status" class="form-select">
                                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${s == order.status}"></option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label text-white-50 small">Note (optional)</label>
                            <input type="text" name="note" class="form-control" placeholder="e.g., Customer requested delay">
                        </div>
                        <button type="submit" class="btn btn-accent rounded-pill"><i class="bi bi-check me-2"></i>Update Status</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Timeline CSS -->
        <style>
        .timeline{position:relative;padding-left:30px}
        .timeline::before{
            content:'';position:absolute;left:15px;top:0;bottom:0;
            width:2px;background:linear-gradient(180deg, rgba(255,90,42,.5), rgba(255,90,42,.1));
        }
        .timeline-item{position:relative;padding-bottom:24px}
        .timeline-item:last-child{padding-bottom:0}
        .timeline-marker{
            position:absolute;left:-23px;width:36px;height:36px;
            border-radius:50%;display:flex;align-items:center;justify-content:center;
            color:#fff;font-size:.9rem;box-shadow:0 4px 12px rgba(0,0,0,.3);
            border:3px solid var(--bg);
        }
        .timeline-content{
            background:linear-gradient(145deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
            border-radius:16px;padding:16px 20px;
            border:1px solid rgba(255,255,255,.08);
        }
        .timeline-item.active .timeline-content{
            border-color:rgba(255,90,42,.3);
            box-shadow:0 4px 20px rgba(255,90,42,.1);
        }
        </style>
    </div>
</div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
