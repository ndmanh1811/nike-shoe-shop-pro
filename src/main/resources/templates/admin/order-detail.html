<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order detail</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div th:replace="~{fragments/admin :: layout(~{::content})}">
    <div th:fragment="content">
        <div class="row g-4">
            <div class="col-xl-8">
                <div class="admin-card">
                    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
                        <div>
                            <div class="eyebrow">Order</div>
                            <h3 class="fw-black mb-1" th:text="${order.orderCode}"></h3>
                            <div class="text-white-50">
                                <span th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                                • <span th:text="${order.paymentMethod}"></span>
                            </div>
                        </div>
                        <span class="badge text-bg-warning align-self-start" th:text="${order.status}"></span>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-dark table-borderless align-middle">
                            <thead>
                            <tr><th>Product</th><th>Size</th><th>Qty</th><th>Price</th><th>Subtotal</th></tr>
                            </thead>
                            <tbody>
                            <tr th:each="item : ${order.items}">
                                <td th:text="${item.productName}"></td>
                                <td th:text="${item.size}"></td>
                                <td th:text="${item.quantity}"></td>
                                <td th:text="${#numbers.formatDecimal(item.unitPrice,0,'COMMA',0,'POINT')} + ' đ'"></td>
                                <td th:text="${#numbers.formatDecimal(item.subtotal,0,'COMMA',0,'POINT')} + ' đ'"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-xl-4">
                <div class="admin-card mb-4">
                    <h5 class="fw-bold mb-3">Customer info</h5>
                    <p class="mb-1"><strong>Name:</strong> <span th:text="${order.customerName}"></span></p>
                    <p class="mb-1"><strong>Email:</strong> <span th:text="${order.email}"></span></p>
                    <p class="mb-1"><strong>Phone:</strong> <span th:text="${order.phone}"></span></p>
                    <p class="mb-0"><strong>Address:</strong> <span th:text="${order.address}"></span></p>
                </div>

                <div class="admin-card">
                    <h5 class="fw-bold mb-3">Payment summary</h5>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Subtotal</span>
                        <strong th:text="${#numbers.formatDecimal(order.subtotalAmount,0,'COMMA',0,'POINT')} + ' đ'"></strong>
                    </div>
                    <div class="d-flex justify-content-between mb-2 text-success" th:if="${order.discountAmount > 0}">
                        <span>Discount</span>
                        <strong>-<span th:text="${#numbers.formatDecimal(order.discountAmount,0,'COMMA',0,'POINT')} + ' đ'"></span></strong>
                    </div>
                    <div class="d-flex justify-content-between mb-2" th:if="${order.couponCode != null}">
                        <span>Coupon</span><strong th:text="${order.couponCode}"></strong>
                    </div>
                    <hr class="border-secondary">
                    <div class="d-flex justify-content-between mb-4">
                        <span class="fw-semibold">Total</span>
                        <strong class="fs-4" th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')} + ' đ'"></strong>
                    </div>

                    <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post" class="d-grid gap-3">
                        <label class="form-label mb-0">Update status</label>
                        <select name="status" class="form-select">
                            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${s == order.status}"></option>
                        </select>
                        <button class="btn btn-light rounded-pill">Save status</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
