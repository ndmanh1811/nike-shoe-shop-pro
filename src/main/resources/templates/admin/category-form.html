<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Category form</title>

    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>

<div th:replace="~{fragments/admin :: layout(~{::content})}">
    <div th:fragment="content">

        <div class="admin-card mx-auto" style="max-width: 900px;">

            <h5 class="fw-bold mb-4">Category form</h5>

            <form th:action="@{/admin/categories/save}" method="post" th:object="${form}" class="row g-3">

                <!-- ID -->
                <input type="hidden" th:field="*{id}">

                <!-- ❌ ĐÃ XOÁ CSRF -->

                <!-- NAME -->
                <div class="col-md-6">
                    <label class="form-label">Name</label>
                    <input class="form-control" th:field="*{name}">
                </div>

                <!-- SLUG -->
                <div class="col-md-6">
                    <label class="form-label">Slug</label>
                    <input class="form-control" th:field="*{slug}">
                </div>

                <!-- ORDER -->
                <div class="col-md-4">
                    <label class="form-label">Display order</label>
                    <input class="form-control" type="number" th:field="*{displayOrder}">
                </div>

                <!-- FEATURED -->
                <div class="col-md-4">
                    <label class="form-label">Featured</label>
                    <select class="form-select" th:field="*{featured}">
                        <option value="true">Yes</option>
                        <option value="false">No</option>
                    </select>
                </div>

                <!-- ACTIVE -->
                <div class="col-md-4">
                    <label class="form-label">Active</label>
                    <select class="form-select" th:field="*{active}">
                        <option value="true">Yes</option>
                        <option value="false">No</option>
                    </select>
                </div>

                <!-- BUTTON -->
                <div class="col-12 d-flex gap-2 mt-3">
                    <button class="btn btn-light rounded-pill px-4">Save</button>
                    <a class="btn btn-outline-light rounded-pill px-4"
                       th:href="@{/admin/categories}">Back</a>
                </div>

            </form>

        </div>

    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
