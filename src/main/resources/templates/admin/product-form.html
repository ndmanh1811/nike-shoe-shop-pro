<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product form</title>

    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>

<div th:replace="~{fragments/admin :: layout(~{::content})}">
    <div th:fragment="content">

        <div class="admin-card mx-auto" style="max-width: 1100px;">
            <h5 class="fw-bold mb-4">Product form</h5>

            <form th:action="@{/admin/products/save}" method="post" th:object="${form}" class="row g-3">

                <input type="hidden" th:field="*{id}">

                <div class="col-md-6">
                    <label>Name</label>
                    <input class="form-control" th:field="*{name}">
                </div>

                <div class="col-md-6">
                    <label>Slug</label>
                    <input class="form-control" th:field="*{slug}">
                </div>

                <div class="col-12">
                    <label>Description</label>
                    <textarea class="form-control" th:field="*{description}"></textarea>
                </div>

                <div class="col-md-3">
                    <label>Price</label>
                    <input class="form-control" type="number" th:field="*{price}">
                </div>

                <div class="col-md-3">
                    <label>Sale</label>
                    <input class="form-control" type="number" th:field="*{salePrice}">
                </div>

                <div class="col-md-3">
                    <label>Stock</label>
                    <input class="form-control" type="number" th:field="*{stock}">
                </div>

                <div class="col-md-3">
                    <label>Size</label>
                    <input class="form-control" th:field="*{sizeRange}">
                </div>

                <div class="col-md-6">
                    <label>Image URL</label>
                    <input class="form-control" th:field="*{imageUrl}">
                </div>

                <!-- 🔥 PREVIEW -->
                <div class="col-md-6">
                    <img th:if="${form.imageUrl != null}" th:src="${form.imageUrl}"
                         style="max-height:120px;">
                </div>

                <div class="col-md-6">
                    <label>Category</label>
                    <select class="form-select" th:field="*{categoryId}">
                        <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label>Brand</label>
                    <select class="form-select" th:field="*{brandId}">
                        <option th:each="b : ${brands}" th:value="${b.id}" th:text="${b.name}"></option>
                    </select>
                </div>

                <div class="col-12 d-flex gap-2">
                    <button class="btn btn-light">Save</button>
                    <a class="btn btn-outline-light" th:href="@{/admin/products}">Back</a>
                </div>

            </form>

        </div>

    </div>
</div>

</body>
</html>
