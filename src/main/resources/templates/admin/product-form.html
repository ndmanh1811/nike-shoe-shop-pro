<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product form</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div th:replace="~{fragments/admin :: layout(~{::content})}">
    <div th:fragment="content">
        <div class="admin-card mx-auto" style="max-width: 1100px;">
            <h5 class="fw-bold mb-4">Product form</h5>
            <form th:action="@{/admin/products/save}" method="post" th:object="${form}" class="row g-3">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="col-md-6"><label class="form-label">Name</label><input class="form-control" th:field="*{name}"></div>
                <div class="col-md-6"><label class="form-label">Slug</label><input class="form-control" th:field="*{slug}"></div>
                <div class="col-12"><label class="form-label">Description</label><textarea class="form-control" rows="4" th:field="*{description}"></textarea></div>
                <div class="col-md-3"><label class="form-label">Price</label><input class="form-control" type="number" step="0.01" th:field="*{price}"></div>
                <div class="col-md-3"><label class="form-label">Sale price</label><input class="form-control" type="number" step="0.01" th:field="*{salePrice}"></div>
                <div class="col-md-3"><label class="form-label">Stock</label><input class="form-control" type="number" th:field="*{stock}"></div>
                <div class="col-md-3"><label class="form-label">Size range</label><input class="form-control" th:field="*{sizeRange}"></div>
                <div class="col-md-6"><label class="form-label">Image URL</label><input class="form-control" th:field="*{imageUrl}"></div>
                <div class="col-md-3"><label class="form-label">Category</label><select class="form-select" th:field="*{categoryId}"><option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option></select></div>
                <div class="col-md-3"><label class="form-label">Brand</label><select class="form-select" th:field="*{brandId}"><option th:each="b : ${brands}" th:value="${b.id}" th:text="${b.name}"></option></select></div>
                <div class="col-md-4"><label class="form-label">Featured</label><select class="form-select" th:field="*{featured}"><option value="true">Yes</option><option value="false">No</option></select></div>
                <div class="col-md-4"><label class="form-label">Bestseller</label><select class="form-select" th:field="*{bestseller}"><option value="true">Yes</option><option value="false">No</option></select></div>
                <div class="col-md-4"><label class="form-label">Active</label><select class="form-select" th:field="*{active}"><option value="true">Yes</option><option value="false">No</option></select></div>
                <div class="col-12 d-flex gap-2">
                    <button class="btn btn-light rounded-pill px-4">Save</button>
                    <a class="btn btn-outline-light rounded-pill px-4" th:href="@{/admin/products}">Back</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
