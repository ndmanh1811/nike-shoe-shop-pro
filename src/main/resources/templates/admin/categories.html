<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categories</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>

<div th:replace="~{fragments/admin :: layout(~{::content})}">
    <div th:fragment="content">

        <div class="admin-card">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0 fw-bold">Categories</h5>
                <a class="btn btn-light rounded-pill" th:href="@{/admin/categories/create}">
                    Add category
                </a>
            </div>

            <div class="table-responsive">
                <table class="table table-dark table-borderless align-middle">

                    <thead>
                    <tr>
                        <th>Name</th>
                        <th>Slug</th>
                        <th>Order</th>
                        <th>Featured</th>
                        <th>Active</th>
                        <th>Actions</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="c : ${categories}">
                        <td th:text="${c.name}"></td>
                        <td th:text="${c.slug}"></td>
                        <td th:text="${c.displayOrder}"></td>
                        <td th:text="${c.featured ? 'Yes' : 'No'}"></td>
                        <td th:text="${c.active ? 'Yes' : 'No'}"></td>

                        <td class="d-flex gap-2">
                            <a class="btn btn-sm btn-outline-light"
                               th:href="@{'/admin/categories/' + ${c.id} + '/edit'}">
                                Edit
                            </a>

                            <!-- ✅ FIX: XOÁ CSRF -->
                            <form th:action="@{'/admin/categories/' + ${c.id} + '/delete'}" method="post">
                                <button class="btn btn-sm btn-danger">Delete</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>

                </table>
            </div>

        </div>

    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
