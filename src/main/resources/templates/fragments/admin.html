<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="layout(content)">
    <div class="admin-shell">
        <aside class="admin-sidebar">
            <div class="p-4 border-bottom border-secondary">
                <a th:href="@{/admin/dashboard}" class="text-decoration-none text-white d-flex align-items-center gap-2">
                    <span class="brand-mark">S</span>
                    <div>
                        <div class="fw-bold">ShoeHouse Admin</div>
                        <small class="text-white-50">Control panel</small>
                    </div>
                </a>
            </div>
            <nav class="p-3 d-grid gap-2">
                <a class="admin-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                <a class="admin-link" th:href="@{/admin/products}"><i class="bi bi-box-seam me-2"></i> Products</a>
                <a class="admin-link" th:href="@{/admin/categories}"><i class="bi bi-tags me-2"></i> Categories</a>
                <a class="admin-link" th:href="@{/admin/brands}"><i class="bi bi-bag-heart me-2"></i> Brands</a>
                <a class="admin-link" th:href="@{/admin/users}"><i class="bi bi-people me-2"></i> Users</a>
                <a class="admin-link" th:href="@{/admin/orders}"><i class="bi bi-receipt me-2"></i> Orders</a>
                <a class="admin-link" th:href="@{/}"><i class="bi bi-arrow-left me-2"></i> Back to shop</a>
            </nav>
        </aside>
        <main class="admin-main">
            <header class="admin-topbar">
                <div class="container-fluid d-flex justify-content-between align-items-center">
                    <div>
                        <h4 class="mb-0 fw-bold">Admin area</h4>
                        <small class="text-muted">Manage your store in style</small>
                    </div>
                    <a class="btn btn-dark rounded-pill px-4" th:href="@{/logout}">Logout</a>
                </div>
            </header>
            <div class="container-fluid py-4" th:replace="~{::content}"></div>
        </main>
    </div>
</div>
</body>
</html>
