<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShoeHouse | Product</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
<div th:replace="~{fragments/site :: toast}"></div>
<div th:replace="~{fragments/site :: header}"></div>

<section class="container py-5">
    <div class="row g-5 align-items-center">
        <div class="col-lg-6">
            <div class="product-hero">
                <img th:src="${product.imageUrl}" th:alt="${product.name}" class="img-fluid">
            </div>
        </div>
        <div class="col-lg-6">
            <div class="d-flex align-items-center justify-content-between gap-3">
                <small class="text-uppercase text-muted" th:text="${product.brand.name}"></small>
                <form th:action="@{/wishlist/toggle}" method="post">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <button type="submit" class="btn btn-outline-dark rounded-pill px-3">
                        <i class="bi" th:classappend="${inWishlist ? 'bi-heart-fill text-danger' : 'bi-heart'}"></i>
                        <span class="ms-1" th:text="${inWishlist ? #{product.saved} : #{product.save}}"></span>
                    </button>
                </form>
            </div>

            <h1 class="fw-bold display-6 mt-2" th:text="${product.name}"></h1>
            <p class="text-muted mt-3" th:text="${product.description}"></p>

            <div class="price-row my-4">
                <span class="price fs-2" th:text="${#numbers.formatDecimal(product.effectivePrice(),0,'COMMA',0,'POINT')} + ' đ'"></span>
                <span class="text-decoration-line-through text-muted fs-5" th:if="${product.salePrice != null and product.salePrice > 0 and product.salePrice < product.price}" th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')} + ' đ'"></span>
            </div>

            <form th:action="@{/cart/add}" method="post" class="d-grid gap-3">
                <input type="hidden" name="productId" th:value="${product.id}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold" th:text="#{product.size}">Size</label>
                        <select name="size" class="form-select">
                            <option th:each="s : ${availableSizes}" th:value="${s}" th:text="${s}" th:selected="${s == '42'}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold" th:text="#{product.qty}">Qty</label>
                        <input type="number" name="quantity" class="form-control" value="1" min="1" th:attr="max=${product.stock}">
                    </div>
                </div>
                <div class="d-flex flex-wrap gap-3">
                    <button class="btn btn-accent btn-lg rounded-pill px-4" type="submit" th:text="#{product.add.to.cart}">Add to cart</button>
                    <a th:href="@{/shop}" class="btn btn-outline-dark btn-lg rounded-pill px-4" th:text="#{product.back}">Back</a>
                </div>
            </form>

            <div class="mt-4 info-list">
                <div><strong>Category:</strong> <span th:text="${product.category.name}"></span></div>
                <div><strong>Stock:</strong> <span th:text="${product.stock}"></span></div>
                <div><strong>Sizes:</strong> <span th:text="${product.sizeRange}"></span></div>
                <div><strong>Brand:</strong> <span th:text="${product.brand.name}"></span></div>
            </div>
        </div>
    </div>
</section>

<section class="container pb-5" th:if="${not #lists.isEmpty(relatedProducts)}">
    <div class="section-title mb-4">
        <div class="eyebrow text-dark" th:text="#{product.related.products}">Related products</div>
        <h2 class="fw-bold mb-0" th:text="#{product.you.might.like}">You might also like</h2>
    </div>
    <div class="row g-4">
        <div class="col-md-6 col-xl-3" th:each="p : ${relatedProducts}">
            <div class="product-card compact">
                <div class="product-thumb">
                    <img th:src="${p.imageUrl}" th:alt="${p.name}">
                </div>
                <div class="product-body">
                    <small class="text-white-50" th:text="${p.brand.name}"></small>
                    <h6 class="fw-bold mt-1 clamp-2" th:text="${p.name}"></h6>
                    <div class="price-row mt-2">
                        <span class="price" th:text="${#numbers.formatDecimal(p.effectivePrice(),0,'COMMA',0,'POINT')} + ' đ'"></span>
                    </div>
                    <div class="d-flex flex-wrap gap-2 mt-3">
                        <a th:href="@{'/product/' + ${p.slug}}" class="btn btn-light btn-sm rounded-pill flex-grow-1">Details</a>
                        <form th:action="@{/cart/add}" method="post" class="d-flex gap-2">
                            <input type="hidden" name="productId" th:value="${p.id}">
                            <input type="hidden" name="quantity" value="1">
                            <select name="size" class="form-select form-select-sm rounded-pill" style="width:auto; min-width:70px;">
                                <option th:each="s : ${@catalogService.expandSizes(p.sizeRange)}" th:value="${s}" th:text="${s}" th:selected="${s == '42'}"></option>
                            </select>
                            <button class="btn btn-accent btn-sm rounded-pill"><i class="bi bi-bag-plus"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<div th:replace="~{fragments/site :: footer}"></div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:replace="~{fragments/site :: toastScript}"></script>
<script th:replace="~{fragments/site :: langScript}"></script>
<script th:src="@{/js/animations.js}"></script>
</body>
</html>
