<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product != null ? 'ShoeHouse | ' + product.name : 'ShoeHouse | Product Not Found'}">ShoeHouse | Product</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
<div th:replace="~{fragments/site :: toast}"></div>
<div th:replace="~{fragments/site :: header}"></div>

<section class="container py-5">
    <div class="row g-5 align-items-center">
        <div class="col-lg-6">
            <div class="product-hero" th:if="${product != null}">
                <img th:src="${product.imageUrl}" th:alt="${product.name}" class="img-fluid rounded shadow-sm">
            </div>
            <div class="product-hero" th:if="${product == null}">
                <div class="text-center py-5 text-muted">
                    <i class="bi bi-exclamation-circle display-1"></i>
                    <h3 class="mt-3">Product not found</h3>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="d-flex align-items-center justify-content-between gap-3" th:if="${product != null}">
                <small class="text-uppercase text-muted" th:if="${product.brand != null}" th:text="${product.brand.name}"></small>
                
                <form th:action="@{/wishlist/toggle}" method="post">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <button type="submit" class="btn btn-outline-dark rounded-pill px-3">
                        <i class="bi" th:classappend="${inWishlist != null && inWishlist ? 'bi-heart-fill text-danger' : 'bi-heart'}"></i>
                        <span class="ms-1" th:text="${inWishlist != null && inWishlist ? 'Saved' : 'Save'}"></span>
                    </button>
                </form>
            </div>

            <h1 class="fw-bold display-6 mt-2" th:if="${product != null}" th:text="${product.name}"></h1>
            <p class="text-muted mt-3" th:if="${product != null}" th:text="${product.description}"></p>

            <div class="price-row my-4" th:if="${product != null}">
                <span class="price fs-2 text-danger fw-bold" th:text="${#numbers.formatDecimal(product.effectivePrice(), 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                <span class="text-decoration-line-through text-muted fs-5 ms-2" th:if="${product.salePrice != null and product.salePrice > 0 and product.salePrice < product.price}" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
            </div>

            <form th:action="@{/cart/add}" method="post" class="d-grid gap-3" th:if="${product != null}">
                <input type="hidden" name="productId" th:value="${product.id}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Size</label>
                        <select name="size" class="form-select" th:if="${availableSizes != null and !#lists.isEmpty(availableSizes)}">
                            <option th:each="s : ${availableSizes}" th:value="${s}" th:text="${s}"></option>
                        </select>
                        <div th:if="${availableSizes == null or #lists.isEmpty(availableSizes)}" class="text-danger mt-1 small">Out of stock for all sizes</div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Quantity</label>
                        <input type="number" name="quantity" class="form-control" value="1" min="1" th:attr="max=${product.stock != null ? product.stock : 1}">
                    </div>
                </div>
                <div class="d-flex flex-wrap gap-3 mt-3">
                    <button class="btn btn-dark btn-lg rounded-pill px-5" type="submit" th:disabled="${product.stock == null or product.stock <= 0}">
                        <i class="bi bi-cart-plus me-2"></i>Add to cart
                    </button>
                    <a th:href="@{/shop}" class="btn btn-outline-secondary btn-lg rounded-pill px-4">Back to Shop</a>
                </div>
            </form>
            
            <div th:if="${product == null}" class="alert alert-warning mt-4">
                The product you are looking for does not exist or has been removed. <a th:href="@{/shop}" class="alert-link">Return to Shop</a>
            </div>

            <div class="mt-5 p-4 bg-light rounded" th:if="${product != null}">
                <h6 class="fw-bold mb-3">Product Details</h6>
                <div class="row mb-2">
                    <div class="col-4 text-muted">Category:</div>
                    <div class="col-8 fw-medium" th:text="${product.category != null ? product.category.name : 'Uncategorized'}"></div>
                </div>
                <div class="row mb-2">
                    <div class="col-4 text-muted">Stock:</div>
                    <div class="col-8 fw-medium" th:text="${product.stock != null ? product.stock + ' items left' : 'N/A'}"></div>
                </div>
                <div class="row mb-2">
                    <div class="col-4 text-muted">Sizes:</div>
                    <div class="col-8 fw-medium" th:text="${product.sizeRange != null ? product.sizeRange : 'N/A'}"></div>
                </div>
            </div>
        </div>
    </div>
</section>

<div th:replace="~{fragments/site :: footer}"></div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:replace="~{fragments/site :: toastScript}"></script>
<script th:replace="~{fragments/site :: langScript}"></script>
</body>
</html>
