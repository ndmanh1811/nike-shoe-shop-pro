<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShoeHouse | Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
<div th:replace="~{fragments/site :: header}"></div>

<section class="container py-5">
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="panel-card">
                <h3 class="fw-bold mb-4">Checkout details</h3>
                <form th:action="@{/checkout}" method="post" th:object="${form}" class="d-grid gap-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div>
                        <label class="form-label">Full name</label>
                        <input class="form-control" th:field="*{customerName}">
                        <small class="text-danger" th:errors="*{customerName}"></small>
                    </div>
                    <div>
                        <label class="form-label">Phone</label>
                        <input class="form-control" th:field="*{phone}">
                        <small class="text-danger" th:errors="*{phone}"></small>
                    </div>
                    <div>
                        <label class="form-label">Address</label>
                        <textarea class="form-control" rows="3" th:field="*{address}"></textarea>
                        <small class="text-danger" th:errors="*{address}"></small>
                    </div>
                    <div>
                        <label class="form-label">Coupon code</label>
                        <input class="form-control" th:field="*{couponCode}" placeholder="NIKE10">
                        <small class="text-danger" th:errors="*{couponCode}"></small>
                        <small class="text-muted" th:if="${couponQuote != null}" th:text="'Applied: ' + ${couponQuote.title}"></small>
                        <small class="text-danger" th:if="${couponQuote == null and form.couponCode != null and !#strings.isEmpty(form.couponCode)}">Coupon is invalid or not eligible.</small>
                    </div>
                    <div>
                        <label class="form-label">Payment method</label>
                        <select class="form-select" th:field="*{paymentMethod}">
                            <option value="COD">Cash on delivery</option>
                            <option value="ONLINE">Online payment</option>
                        </select>
                    </div>
                    <button class="btn btn-accent btn-lg rounded-pill">Place order</button>
                </form>
            </div>
        </div>
        <div class="col-lg-5">
            <div class="summary-card">
                <h4 class="fw-bold mb-3">Your order</h4>
                <div class="mini-order" th:each="item : ${cartItems}">
                    <img th:src="${item.imageUrl}" class="mini-thumb" alt="">
                    <div class="flex-grow-1">
                        <div class="fw-semibold" th:text="${item.name}"></div>
                        <small class="text-muted">Size <span th:text="${item.size}"></span> • Qty <span th:text="${item.quantity}"></span></small>
                    </div>
                    <strong th:text="${#numbers.formatDecimal(item.subtotal,0,'COMMA',0,'POINT')} + ' đ'"></strong>
                </div>
                <hr>
                <div class="d-flex justify-content-between mb-2">
                    <span>Subtotal</span><strong th:text="${#numbers.formatDecimal(subtotal,0,'COMMA',0,'POINT')} + ' đ'"></strong>
                </div>
                <div class="d-flex justify-content-between mb-2 text-success" th:if="${discountAmount > 0}">
                    <span>Discount</span><strong>-<span th:text="${#numbers.formatDecimal(discountAmount,0,'COMMA',0,'POINT')} + ' đ'"></span></strong>
                </div>
                <div class="d-flex justify-content-between align-items-center">
                    <span class="fs-5 fw-semibold">Total</span>
                    <span class="fs-4 fw-black" th:text="${#numbers.formatDecimal(grandTotal,0,'COMMA',0,'POINT')} + ' đ'"></span>
                </div>
            </div>
        </div>
    </div>
</section>

<div th:replace="~{fragments/site :: footer}"></div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
