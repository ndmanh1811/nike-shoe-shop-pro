<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order placed</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
<div th:replace="~{fragments/site :: header}"></div>

<section class="container py-5">
    <div class="success-card text-center mx-auto">
        <div class="success-icon"><i class="bi bi-check2-circle"></i></div>
        <h1 class="fw-bold mt-3">Order placed successfully</h1>
        <p class="text-muted mb-2">Your order code is <strong th:text="${order.orderCode}"></strong>.</p>
        <div class="d-grid gap-2 text-start mt-4">
            <div class="d-flex justify-content-between">
                <span>Subtotal</span>
                <strong th:text="${#numbers.formatDecimal(order.subtotalAmount,0,'COMMA',0,'POINT')} + ' đ'"></strong>
            </div>
            <div class="d-flex justify-content-between text-success" th:if="${order.discountAmount > 0}">
                <span>Discount</span>
                <strong>-<span th:text="${#numbers.formatDecimal(order.discountAmount,0,'COMMA',0,'POINT')} + ' đ'"></span></strong>
            </div>
            <div class="d-flex justify-content-between">
                <span>Payment method</span>
                <strong th:text="${order.paymentMethod}"></strong>
            </div>
            <hr>
            <div class="d-flex justify-content-between align-items-center">
                <span class="fw-semibold">Total paid</span>
                <span class="fs-4 fw-black" th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')} + ' đ'"></span>
            </div>
        </div>
        <p class="text-muted mt-4 mb-4" th:if="${order.couponCode != null}">
            Coupon applied: <strong th:text="${order.couponCode}"></strong>
        </p>
        <div class="d-flex flex-wrap gap-3 justify-content-center">
            <a th:href="@{/orders}" class="btn btn-outline-dark rounded-pill px-4">View orders</a>
            <a th:href="@{/shop}" class="btn btn-accent rounded-pill px-4">Continue shopping</a>
        </div>
    </div>
</section>

<div th:replace="~{fragments/site :: footer}"></div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
