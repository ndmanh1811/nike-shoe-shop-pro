<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | ShoeHouse</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/site.css}">
    <style>
        .support-card {
            background: linear-gradient(145deg, #111 0%, #1a1a1a 100%);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 28px;
            padding: 40px;
            color: #fff;
            text-align: center;
            max-width: 500px;
            margin: 0 auto;
        }
        .support-icon {
            width: 80px;
            height: 80px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 2rem;
            box-shadow: 0 12px 40px rgba(255,90,42,.3);
        }
        .support-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .support-desc {
            color: rgba(255,255,255,.6);
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: rgba(255,255,255,.05);
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,.08);
            transition: all .3s ease;
        }
        .contact-item:hover {
            background: rgba(255,255,255,.08);
            border-color: rgba(255,90,42,.3);
            transform: translateY(-2px);
        }
        .contact-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: rgba(255,90,42,.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 1.3rem;
        }
        .contact-info {
            text-align: left;
            flex: 1;
        }
        .contact-label {
            font-size: .85rem;
            color: rgba(255,255,255,.5);
            margin-bottom: 2px;
        }
        .contact-value {
            font-weight: 600;
            color: #fff;
            font-size: 1rem;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
            color: rgba(255,255,255,.7);
            text-decoration: none;
            font-weight: 500;
            transition: color .3s ease;
        }
        .back-link:hover {
            color: var(--accent);
        }
    </style>
</head>
<body class="auth-bg">
<div th:replace="~{fragments/site :: toast}"></div>
<section class="auth-shell">
    <div class="support-card">
        <div class="mb-4 text-center">
            <a th:href="@{/}" class="text-decoration-none">
                <div class="brand-mark mx-auto mb-3">S</div>
            </a>
            <h2 class="fw-bold">Forgot your password?</h2>
            <p class="text-muted">No worries! We're here to help.</p>
        </div>
        <div class="support-icon">
            <i class="bi bi-headset"></i>
        </div>
        <p class="support-desc">
            Please contact our customer support team to reset your password.
        </p>

        <div class="contact-item">
            <div class="contact-icon">
                <i class="bi bi-telephone-fill"></i>
            </div>
            <div class="contact-info">
                <div class="contact-label">Hotline</div>
                <div class="contact-value">0900 000 000</div>
            </div>
        </div>

        <div class="contact-item">
            <div class="contact-icon">
                <i class="bi bi-envelope-fill"></i>
            </div>
            <div class="contact-info">
                <div class="contact-label">Email Support</div>
                <div class="contact-value">support@shoehouse.local</div>
            </div>
        </div>

        <div class="contact-item">
            <div class="contact-icon">
                <i class="bi bi-clock-fill"></i>
            </div>
            <div class="contact-info">
                <div class="contact-label">Working Hours</div>
                <div class="contact-value">Mon - Sat | 8:00 - 20:00</div>
            </div>
        </div>

        <a href="/signin" class="btn btn-outline-light rounded-pill px-4 mt-4" style="position:relative; z-index:100;">
            <i class="bi bi-arrow-left me-2"></i><span>Back to Login</span>
        </a>
    </div>
</section>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:replace="~{fragments/site :: toastScript}"></script>
<script th:replace="~{fragments/site :: langScript}"></script>
</body>
</html>
